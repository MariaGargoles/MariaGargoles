name: Generate Snake Animation

on:
    schedule:
        # Actualiza la animación cada 6 horas
        - cron: "0 */6 * * *"
    workflow_dispatch:

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: main

            - uses: Platane/snk@master
              id: snake-gif
              with:
                  github_user_name: mariagargoles
                  svg_out_path: output/github-contribution-grid-snake.svg

            - name: Push to main branch
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add output/github-contribution-grid-snake.svg
                  git commit -m "Update snake animation" || exit 0
                  git push
